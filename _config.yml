gh_edit_view_mode: "tree"
gh_edit_branch: "main"

# Points to the correct fork automatically!
gh_edit_repository: "https://github.com/{{ site.github.repository_nwo }}"
gh_edit_view_mode: "tree"
gh_edit_branch: "main"